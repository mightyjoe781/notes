StylesPath = styles
MinAlertLevel = warning

Packages = Microsoft

[*.md]
BasedOnStyles = Notes, Microsoft

# Microsoft style is tuned for product docs/UI text - many rules don't fit
# technical/code-heavy notes, so only keep terminology + punctuation checks.
Microsoft.Contractions = NO
Microsoft.Wordiness = NO
Microsoft.Passive = NO
Microsoft.Vocab = NO
Microsoft.Adverbs = NO
Microsoft.Foreign = NO
Microsoft.Headings = NO
Microsoft.Acronyms = NO
Microsoft.Avoid = NO
